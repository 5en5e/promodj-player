
<!DOCTYPE html>
<html>
  <head>
    <title>PromoDJ player</title>
    <link rel="icon" href="assets/favicon.ico" sizes="any">
    <meta charset="UTF-8">
    <link href="main.css" rel="stylesheet" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="split-container">
      <div class="pane left">
        <div class="left-container">
          <!--
          <div class="album">
            <div class="cover"></div>
            <div class="name">...</div>
          </div>
          -->
        </div>
      </div>
      <div class="divider"></div>
      <div class="pane right">
        <div class="right-container">
          <div class="album">
            <div class="name">...</div>
            <div class="cover-tracklist">
              <div class="wrapper">
                <div class="cover"></div>
                <div class="play-pause" icon="play"></div>
              </div>
              <ol class="tracklist">
              <!--
              <li class="track" starttime="">
                <span class="state"></span>
                <span class="title-performer">...</span>
                <span class="duration"></span>
              </li>
              -->
              </ol>
            </div>
          </div>
          <div class="footer">
            <div class="audio-progress">
              <div class="progress-value"></div>
            </div>
            <div class="controls">
              <div class="sound">
                <div class="mute" muted="false"></div>
                <div class="volume">
                  <input type="range" value="50" max="100" autocomplete="off">
                </div>
              </div>
              <div class="order">
                <div class="prev-wrapper">
                  <div class="prev"></div>
                </div>
                <div class="play-pause-wrapper">
                  <div class="play-pause" icon="play"></div>
                </div>
                <div class="next-wrapper">
                  <div class="next"></div>
                </div>
              </div>
              <div class="misc">
                <div class="loop" state="off">⟲</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
